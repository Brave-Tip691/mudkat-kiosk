<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480, initial-scale=1.0">
  <title>MUDKAT NOC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #1a0a2e;
      --cyan: #00d4ff;
      --green: #00ff88;
      --yellow: #ffcc00;
      --red: #ff4444;
      --dim: #666688;
      --panel-bg: rgba(0, 212, 255, 0.04);
      --panel-border: rgba(0, 212, 255, 0.25);
    }

    html, body {
      width: 800px;
      height: 480px;
      overflow: hidden;
      background: var(--bg);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      user-select: none;
      cursor: default;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        transparent 0px,
        transparent 3px,
        rgba(0, 0, 0, 0.08) 3px,
        rgba(0, 0, 0, 0.08) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ---- Top bar ---- */
    .top-bar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel-bg);
    }

    .top-bar .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--cyan);
      letter-spacing: 3px;
    }

    .top-bar .clock {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: var(--yellow);
      letter-spacing: 1px;
    }

    /* ---- Tile row ---- */
    .tile-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      height: calc(480px - 48px - 32px);
      padding: 0 24px;
    }

    .tile {
      position: relative;
      width: 220px;
      height: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--panel-bg);
      cursor: pointer;
      transition: box-shadow 0.15s ease, background 0.15s ease;
    }

    .tile:active {
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.6), inset 0 0 10px rgba(0, 212, 255, 0.1);
      background: rgba(0, 212, 255, 0.08);
    }

    /* Corner brackets - top-left & top-right via tile pseudo-elements */
    .tile::before,
    .tile::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
    }

    .tile::before {
      top: -1px;
      left: -1px;
      border-top: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }

    .tile::after {
      top: -1px;
      right: -1px;
      border-top: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
    }

    /* Bottom corners via inner element */
    .tile-corners::before,
    .tile-corners::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
    }

    .tile-corners::before {
      bottom: -1px;
      left: -1px;
      border-bottom: 2px solid var(--cyan);
      border-left: 2px solid var(--cyan);
    }

    .tile-corners::after {
      bottom: -1px;
      right: -1px;
      border-bottom: 2px solid var(--cyan);
      border-right: 2px solid var(--cyan);
    }

    .tile .tile-corners {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .tile-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tile-icon svg {
      width: 56px;
      height: 56px;
      fill: none;
      stroke: var(--cyan);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tile-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--cyan);
      letter-spacing: 2px;
      text-align: center;
    }

    .tile-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.3s ease;
    }

    .status-dot.online {
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.slow {
      background: var(--yellow);
      animation: none;
    }

    .status-dot.offline {
      background: var(--red);
      animation: none;
    }

    .status-label {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
    }

    /* Flash effect on tap */
    .tile.flash {
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.8), inset 0 0 15px rgba(0, 212, 255, 0.2);
      background: rgba(0, 212, 255, 0.12);
    }

    /* ---- Bottom status bar ---- */
    .status-bar {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-top: 1px solid var(--panel-border);
      background: var(--panel-bg);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 1px;
    }

    .status-bar span {
      white-space: nowrap;
    }

    /* ---- Service overlay top bar ---- */
    .service-bar {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 800px;
      height: 48px;
      z-index: 9998;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(26, 10, 46, 0.92);
      border-bottom: 1px solid var(--cyan);
    }

    .service-bar.visible {
      display: flex;
    }

    .service-bar .home-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: var(--cyan);
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid var(--cyan);
      border-radius: 4px;
      padding: 6px 14px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: box-shadow 0.15s ease, background 0.15s ease;
    }

    .service-bar .home-btn:active {
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.6);
      background: rgba(0, 212, 255, 0.25);
    }

    .service-bar .service-name {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 13px;
      color: var(--cyan);
      letter-spacing: 2px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .service-bar .svc-clock {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--yellow);
      letter-spacing: 1px;
    }

    /* Hide home content when service is active */
    .home-content.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Service overlay top bar (hidden until a service is active) -->
  <div class="service-bar" id="service-bar">
    <button class="home-btn" id="home-btn">&#8962; HOME</button>
    <span class="service-name" id="service-name"></span>
    <span class="svc-clock" id="svc-clock">--:--:--</span>
  </div>

  <div class="home-content" id="home-content">
  <div class="top-bar">
    <span class="title">MUDKAT NOC</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>

  <div class="tile-row">
    <!-- Grafana -->
    <div class="tile" data-service="grafana">
      <div class="tile-corners"></div>
      <div class="tile-icon">
        <svg viewBox="0 0 64 64">
          <!-- Bar chart icon -->
          <rect x="8" y="36" width="10" height="20" rx="1" />
          <rect x="27" y="20" width="10" height="36" rx="1" />
          <rect x="46" y="8" width="10" height="48" rx="1" />
        </svg>
      </div>
      <div class="tile-name">GRAFANA</div>
      <div class="tile-status">
        <div class="status-dot" id="dot-grafana"></div>
        <span class="status-label" id="label-grafana">CHECKING</span>
      </div>
    </div>

    <!-- Uptime Kuma -->
    <div class="tile" data-service="uptime">
      <div class="tile-corners"></div>
      <div class="tile-icon">
        <svg viewBox="0 0 64 64">
          <!-- Heartbeat/pulse icon -->
          <polyline points="4,32 16,32 22,12 28,52 34,24 40,40 46,32 60,32" />
        </svg>
      </div>
      <div class="tile-name">UPTIME KUMA</div>
      <div class="tile-status">
        <div class="status-dot" id="dot-uptime"></div>
        <span class="status-label" id="label-uptime">CHECKING</span>
      </div>
    </div>

    <!-- Pi-hole -->
    <div class="tile" data-service="pihole">
      <div class="tile-corners"></div>
      <div class="tile-icon">
        <svg viewBox="0 0 64 64">
          <!-- Shield icon -->
          <path d="M32 4 L56 16 V36 C56 50 32 60 32 60 C32 60 8 50 8 36 V16 Z" />
          <polyline points="22,32 30,40 42,24" />
        </svg>
      </div>
      <div class="tile-name">PI-HOLE</div>
      <div class="tile-status">
        <div class="status-dot" id="dot-pihole"></div>
        <span class="status-label" id="label-pihole">CHECKING</span>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="display-ip">PI: --</span>
    <span id="display-gw">GW: --</span>
    <span id="uptime-display">UPTIME: --</span>
  </div>
  </div><!-- /.home-content -->

  <script src="dashboard.js"></script>
</body>
</html>
